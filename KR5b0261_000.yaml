body:
  text: 太上靈寶淨明入道品靈寶淨明院真師密誥太上靈寶淨明法印式太上靈寶淨明入道品太上靈寶淨明祕院在太上上清玄都玉亰山之西乃道君修法之院兼三景之法而統之以和天地以奉君親以役鬼神以度人物以逐邪魔自號太上靈寶法籙忠孝弟子主淨明祕院同管法事有邃職遙勳即於此下稱之當至心行持一孝悌二錬形三救度逐日燒香朝禮禮拜諸天為國王父母資崇福壽次為一切有情方乃依次呼召神明有事委問之無事即遣其速歸局分心中常務正直孝友不得邪淫諂曲輕道慢法如欲降未來之愆即當置一小册日録所為其有欺心自不可形於紙者是也凡有似此即速攺之則法術自靈如或違之則災咎立至但能依此則遙勳正授超舉凡塵天書祕法忽然而至問弟子能行否凡得淨明法者當自畏懼逐日恭敬君上孝悌六親克苦修行勤誠濟拔心中常如負人不可報之恩思有必可報之意則怡聲下氣無恚無怒正得淨明之體坐卧處常置一鑑一盂水則自知吾立法之意凡得淨明法者皆上帝記録委任不輕罪消北府記名南宫吏十二在前吏十二在後無論汙潔行止必隨今人出入有左右使令尚不敢輕為淫僻况此天神名在仙籙護衛於子子可忽諸凡得淨明法者金骨玉肉已與神通手判幽隂言接靈妙若懷淫僻則正如以金王棄之土壤慎無搖蕩損動氣血氣血堅完則妖邪不入自得正真不致夭折飛升超舉長生之本在於不貪淫欲切冝記之凡得淨明法者在世暫以塵劫未足不即超升如能積行纍功計必離凡入聖恩生於害無嫌棄妻子於等間害生於恩莫羡慕妻子而淪喪閨門之內以義斷恩割愛捨情同歸霄漢若夫貪求聚物克意無厭損物陷人以遺兒女勞形竭髓以恱婦人則此皆可巳如能化之以道同學修行可謂知本設或不從則於成道之日彼亦大蒙福廕何必區區眼目之事凡得淨明法者務在濟物見他人之父見他人之母如我父母矜老恤孤憐貧憫病如病危急若在已身如此用心可得吾理當念之凡得淨明法者務在廉平居官者無恃冨貴居貧者莫羞貧賤天公受分毫髮無私我見諸弟子得吾法之後妄意行持居多害物檀自斬伐考戮鬼神叱吒雲雷如使奴僕冨貴者逢召不至貧賤者見利即往或因怒寫使役鬼神使之報怨殺讎曲用天憲拆破條文增添字劃皆吾所甚病也凡得淨明法者雖不升真亦能尸解雖未明中役鬼亦且暗處伏從即不得便生憤躁要在堅切我諸弟子多有受法之後不量已之積纍便即咎怨父師無寸功而便欲飛升神未明達而便欲堅求玄奧則又可以為戒也凡得淨明法者不得妄以付人且自為度師直候見聞位在隂官當遇緣合之人望東燒香以問於我我許即傳即我是度師汝為傳教之師日宫太陽孝道明王乃祖師也吳君為籍師諶姆為經師日直元君張公即監度師如數十弟子成道則他日升真當如我矣凡得淨明法者以緣合忠孝氣血完實直諒可受之人而傳之即不得以貧而不授冨而則傳違之罪及三世凡得淨明法者將欲傳度即具表奏祖師太陽上帝依常式醮設三界證明謝恩務在量力不得舉債破費財物失所吾一時旨喻不限定儀也凡得淨明法者遇人傳付之時即表奏之後於表奏內保明弟子九代加升仙職便補為四字仙佐其夜書符九道結草人九箇望天門燒則此草人化為九直符執符以往不論地獄六道即此符到處便得解釋以比符文於天樞院請領文字便是仙官如有仙職者後升階次書符之時戴日履斗口傳心受望天門書之符朱書書符呪曰淨明祕典升入仙官忠孝之子福及其親九世蒙秩受命升仙寶籙行處無不奉以周旋急急如律令然後方付上件文字與之行持掐子文步斗想日在頭上太上靈寶淨明入道品終
